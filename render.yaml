services:
  - type: web
    name: comment-bot-server
    runtime: python
    region: oregon
    plan: starter
    buildCommand: ./build.sh
    startCommand: gunicorn instagramApp:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300 --preload
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER
        value: "true"
      - key: DOLPHIN_API_TOKEN
        sync: false
      - key: DOLPHIN_LOCAL_API_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /health
